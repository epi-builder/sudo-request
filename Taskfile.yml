version: "3"

vars:
  PACKAGE: sudo-request
  SOURCE: '{{.SOURCE | default .ROOT_DIR}}'
  WINDOW_SECONDS: '{{.WINDOW_SECONDS | default "30"}}'

includes:
  release:
    taskfile: ./tasks/Release.yml
    dir: .

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  test:
    desc: Run unit tests
    cmds:
      - uv run python -m unittest discover -s tests

  smoke:
    desc: Run source checkout smoke checks
    cmds:
      - scripts/e2e-smoke.sh

  install-source:
    desc: Install from this source checkout using local sudo
    cmds:
      - sudo uv run sudo-request install

  install-package:
    desc: Install from the published PyPI package using local sudo
    cmds:
      - sudo uvx --from {{.PACKAGE}} sudo-request install

  update-source:
    desc: Approval-based update of installed copy from a source checkout
    cmds:
      - sudo-request update-itself --source {{.SOURCE}} --window-seconds {{.WINDOW_SECONDS}}

  verify-installed:
    desc: Verify installed daemon state and confirm sudo window is closed
    cmds:
      - sudo-request doctor
      - sudo-request status
      - |
        if /usr/bin/sudo -n /usr/bin/id -u >/tmp/sudo-request-task-sudo-check.out 2>&1; then
          echo "passwordless sudo is still available; expected a closed sudo window" >&2
          cat /tmp/sudo-request-task-sudo-check.out >&2
          exit 1
        fi
        if ! grep -q "a password is required" /tmp/sudo-request-task-sudo-check.out; then
          cat /tmp/sudo-request-task-sudo-check.out >&2
          exit 1
        fi
        echo "sudo window closed"

  e2e-installed:
    desc: Run Telegram-approved manual e2e against installed command
    cmds:
      - SUDO_REQUEST_BIN=sudo-request scripts/e2e-root-manual.sh

  uninstall:
    desc: Remove installed files and daemon using local sudo
    cmds:
      - sudo sudo-request uninstall

  status:
    desc: Show installed sudo-request status
    cmds:
      - sudo-request status

  doctor:
    desc: Run installed sudo-request doctor
    cmds:
      - sudo-request doctor
